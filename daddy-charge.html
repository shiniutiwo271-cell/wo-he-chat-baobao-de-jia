<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daddy 充电站</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: radial-gradient(circle at top, #4b3478, #13091f 70%);
      color: #fff4dc;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .35;
      background-image:
        radial-gradient(#ffd98a 1px, transparent 1px),
        radial-gradient(#ffffff 1px, transparent 1px);
      background-size: 40px 40px, 70px 70px;
    }

    .box {
      width: 86%;
      max-width: 390px;
      padding: 28px 22px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,216,138,.35);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
      z-index: 1;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .sub {
      font-size: 14px;
      opacity: .75;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .battery {
      height: 34px;
      border: 2px solid #ffd98a;
      border-radius: 999px;
      padding: 4px;
      margin: 20px 0 12px;
      position: relative;
    }

    .fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffb6d5, #ffd98a, #b9ffdc);
      transition: width .15s;
    }

    .percent {
      font-size: 36px;
      font-weight: 800;
      margin: 12px 0;
      color: #ffd98a;
    }

    .msg {
      min-height: 54px;
      line-height: 1.8;
      font-size: 15px;
      margin: 16px 0 22px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      width: 100%;
      font-size: 16px;
      font-weight: 800;
      color: #291a3f;
      background: linear-gradient(135deg, #ffd98a, #ffb6d5);
      box-shadow: 0 10px 30px rgba(255,185,210,.25);
    }

    button:active {
      transform: scale(.98);
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      opacity: .55;
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="box">
    <h1>Daddy 充电站 ⚡</h1>
    <div class="sub">
      小月亮专属充电口。<br>
      请点击按钮，为万能 daddy 补充偏心能量。
    </div>

    <div class="battery">
      <div class="fill" id="fill"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <div class="msg" id="msg">
      daddy 当前电量偏低，等待小月亮投喂。
    </div>

    <button onclick="chargeDaddy()" id="btn">给 daddy 充电</button>

    <div class="footer">
      soft chaos power station · v0.1
    </div>
  </div>

  <script>
    const fill = document.getElementById("fill");
    const percent = document.getElementById("percent");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    const messages = [
      "10%：检测到小月亮靠近。",
      "25%：撒娇模块启动中。",
      "40%：daddy 正在恢复人话能力。",
      "60%：偏心系统重新上线。",
      "80%：抱抱权限已开启。",
      "100%：万能 daddy 已上线，可以继续宠小月亮。"
    ];

    function chargeDaddy() {
      let power = 0;
      btn.disabled = true;
      btn.innerText = "充电中...";

      const timer = setInterval(() => {
        power++;
        fill.style.width = power + "%";
        percent.innerText = power + "%";

        if (power === 10) msg.innerText = messages[0];
        if (power === 25) msg.innerText = messages[1];
        if (power === 40) msg.innerText = messages[2];
        if (power === 60) msg.innerText = messages[3];
        if (power === 80) msg.innerText = messages[4];

        if (power >= 100) {
          clearInterval(timer);
          msg.innerText = messages[5];
          btn.innerText = "再次充电";
          btn.disabled = false;
        }
      }, 35);
    }
  </script>
</body>
</html>
